<svg width="300" height="150" viewBox="190 0 300 150" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Expense Tracker App Logo</title>
  <desc>A clean logo for an Expense Tracker app featuring a stylized wallet with a trend line, in olive green #6b8e23</desc>

  <defs>
    <clipPath id="cardClip">
      <rect x="240" y="20" width="200" height="140" rx="18"/>
    </clipPath>
  </defs>

  <!-- Card body -->
  <rect x="240" y="20" width="200" height="140" rx="18" fill="#6b8e23"/>

  <!-- Card shine strip -->
  <rect x="240" y="45" width="200" height="22" fill="#7da02a" clip-path="url(#cardClip)"/>

  <!-- Wallet pocket circle -->
  <circle cx="390" cy="92" r="26" fill="#5a7a1c"/>
  <circle cx="390" cy="92" r="16" fill="#4d6a18"/>

  <!-- Coin slot highlight -->
  <ellipse cx="390" cy="92" rx="6" ry="9" fill="#6b8e23" opacity="0.7"/>

  <!-- Leaf accent top-left on card -->
  <ellipse cx="265" cy="34" rx="11" ry="7" fill="#ffffff" opacity="0.15" transform="rotate(-30 265 34)"/>

  <!-- Trend line -->
  <polyline points="254,115 272,102 290,108 312,88 332,78" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="332" cy="78" r="3.5" fill="#ffffff" opacity="0.9"/>

  <!-- Dollar sign on coin -->
  <text x="390" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#6b8e23" font-family="-apple-system, Helvetica Neue, Arial, sans-serif">$</text>
</svg>
