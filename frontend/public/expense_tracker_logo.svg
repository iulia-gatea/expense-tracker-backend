<svg width="300" height="270" viewBox="190 50 300 270" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Expense Tracker App Logo</title>
  <desc>A clean logo for an Expense Tracker app featuring a stylized wallet with a trend line, in olive green #6b8e23</desc>

  <defs>
    <clipPath id="cardClip">
      <rect x="240" y="80" width="200" height="140" rx="18"/>
    </clipPath>
  </defs>

  <!-- Card body -->
  <rect x="240" y="80" width="200" height="140" rx="18" fill="#6b8e23"/>

  <!-- Card shine strip -->
  <rect x="240" y="105" width="200" height="22" fill="#7da02a" clip-path="url(#cardClip)"/>

  <!-- Wallet pocket circle -->
  <circle cx="390" cy="152" r="26" fill="#5a7a1c"/>
  <circle cx="390" cy="152" r="16" fill="#4d6a18"/>

  <!-- Coin slot highlight -->
  <ellipse cx="390" cy="152" rx="6" ry="9" fill="#6b8e23" opacity="0.7"/>

  <!-- Leaf accent top-left on card -->
  <ellipse cx="265" cy="94" rx="11" ry="7" fill="#ffffff" opacity="0.15" transform="rotate(-30 265 94)"/>

  <!-- Trend line -->
  <polyline points="254,175 272,162 290,168 312,148 332,138" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="332" cy="138" r="3.5" fill="#ffffff" opacity="0.9"/>

  <!-- Dollar sign on coin -->
  <text x="390" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#6b8e23" font-family="-apple-system, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue">$</text>

  <!-- App name -->
  <text x="340" y="252" text-anchor="middle" font-size="26" font-weight="600" fill="#6b8e23" letter-spacing="0.5" font-family="-apple-system, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue">Expense Tracker</text>

  <!-- Tagline -->
  <text x="340" y="278" text-anchor="middle" font-size="13" fill="#7da02a" letter-spacing="1.5" font-family="-apple-system, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue">TRACK · SAVE · GROW</text>
</svg>
